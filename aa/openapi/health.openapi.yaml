openapi: 3.0.3
info:
  title: cmdb2monitoring Health API
  version: 0.4.0
servers:
  - url: http://localhost:5080
    description: cmdbwebhooks2kafka dev
  - url: http://192.168.202.100:5080
    description: cmdbwebhooks2kafka dev from CMDBuild Docker container
  - url: http://localhost:5081
    description: cmdbkafka2zabbix dev
  - url: http://localhost:5082
    description: zabbixrequests2api dev
  - url: http://localhost:5090
    description: monitoring-ui-api dev
paths:
  /health:
    get:
      summary: Service health check
      operationId: getServiceHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [service, status]
                properties:
                  service:
                    type: string
                  status:
                    type: string
                    example: ok
  /admin/reload-rules:
    post:
      summary: Reload cmdbkafka2zabbix conversion rules
      description: >
        Available on cmdbkafka2zabbix. The endpoint calls the configured
        conversion rules provider; the current Git provider may run
        git pull --ff-only when ConversionRules:PullOnReload is enabled.
      security:
        - reloadBearer: []
      responses:
        '200':
          description: Conversion rules were reloaded.
          content:
            application/json:
              schema:
                type: object
                required: [service, status, rules]
                properties:
                  service:
                    type: string
                  status:
                    type: string
                    example: ok
                  rules:
                    type: object
                    additionalProperties: true
        '401':
          description: Missing or invalid bearer token.
        '503':
          description: Reload token is not configured.
components:
  securitySchemes:
    reloadBearer:
      type: http
      scheme: bearer
