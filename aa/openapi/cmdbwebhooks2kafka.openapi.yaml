openapi: 3.0.3
info:
  title: cmdbwebhooks2kafka HTTP API
  version: 0.4.0
  description: >
    Receives flat CMDBuild webhook payloads. Reference and lookup fields can
    carry numeric ids; leaf interpretation is driven by conversion rules
    metadata in downstream cmdbkafka2zabbix.
servers:
  - url: http://localhost:5080
    description: Dev server from host
  - url: http://192.168.202.100:5080
    description: Dev server from CMDBuild Docker container
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /webhooks/cmdbuild:
    post:
      summary: Receive CMDBuild webhook
      operationId: receiveCmdbuildWebhook
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CmdbWebhookPayload'
      responses:
        '202':
          description: Event accepted and published to Kafka
        '400':
          description: Invalid JSON payload
        '401':
          description: Invalid or missing Bearer token
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthResponse:
      type: object
      required: [service, status]
      properties:
        service:
          type: string
        status:
          type: string
          example: ok
    CmdbWebhookPayload:
      type: object
      required: [source, eventType, cmdbuildEvent, className, id, code]
      additionalProperties: true
      properties:
        source:
          type: string
          example: cmdbuild
        eventType:
          type: string
          enum: [create, update, delete]
        cmdbuildEvent:
          type: string
          enum: [card_create_after, card_update_after, card_delete_after]
        className:
          type: string
          description: CMDBuild class name from the concrete model; current dev examples include Notebook, PC, Server, and tk.
        id:
          type: string
        code:
          type: string
        ip_address:
          type: string
        interface:
          type: string
          description: Example source key for an additional interface IP; the actual key can be any name declared in rules.
        interface2:
          type: string
          description: Example source key for a second additional interface IP; the actual key can be any name declared in rules.
        profile:
          type: string
          description: Example source key for an additional monitoring profile IP; the actual key can be any name declared in rules.
        profile2:
          type: string
          description: Example source key for a second additional monitoring profile IP; the actual key can be any name declared in rules.
        dns_name:
          type: string
        profile_dns:
          type: string
          description: DNS field for profileDnsName.
        description:
          type: string
        OS:
          type: string
          description: Example lookup source key for operating system; actual source keys are defined by rules and may carry numeric ids.
        os:
          type: string
          description: Нормализованное поле OS, если payload использует lowercase.
        zabbixTag:
          type: string
          description: Example lookup source key for Zabbix tag selection; actual source keys and lookup values are defined by rules.
