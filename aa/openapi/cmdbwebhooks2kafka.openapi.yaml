openapi: 3.0.3
info:
  title: cmdbwebhooks2kafka HTTP API
  version: 0.2.0
servers:
  - url: http://localhost:5080
    description: Dev server from host
  - url: http://192.168.202.100:5080
    description: Dev server from CMDBuild Docker container
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /webhooks/cmdbuild:
    post:
      summary: Receive CMDBuild webhook
      operationId: receiveCmdbuildWebhook
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CmdbWebhookPayload'
      responses:
        '202':
          description: Event accepted and published to Kafka
        '400':
          description: Invalid JSON payload
        '401':
          description: Invalid or missing Bearer token
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthResponse:
      type: object
      required: [service, status]
      properties:
        service:
          type: string
        status:
          type: string
          example: ok
    CmdbWebhookPayload:
      type: object
      required: [source, eventType, cmdbuildEvent, className, id, code]
      additionalProperties: true
      properties:
        source:
          type: string
          example: cmdbuild
        eventType:
          type: string
          enum: [create, update, delete]
        cmdbuildEvent:
          type: string
          enum: [card_create_after, card_update_after, card_delete_after]
        className:
          type: string
          enum: [Notebook, PC, Server, tk]
        id:
          type: string
        code:
          type: string
        ip_address:
          type: string
        management_ip:
          type: string
          description: Дополнительный management/OOB IP для hostProfiles или второго Zabbix interface.
        dns_name:
          type: string
        management_dns:
          type: string
          description: Дополнительное management/OOB DNS-имя для hostProfiles или второго Zabbix interface.
        description:
          type: string
        OS:
          type: string
          description: CMDBuild lookup id или человекочитаемое значение OS.
        os:
          type: string
          description: Нормализованный alias OS, если payload использует lowercase.
        zabbixTag:
          type: string
