openapi: 3.0.3
info:
  title: cmdb2monitoring monitoring UI API
  version: 0.4.0
  description: >
    Backend-for-frontend API for dashboard, server-side sessions, Kafka event
    browsing, rules validation, dry-run, browser save-as, runtime settings, authorization settings,
    CMDBuild/Zabbix catalog synchronization, conversion rules management,
    logical control of conversion rules, and CMDBuild webhook planning/apply.
    Interface language is a browser cookie concern and does not change API contracts.
servers:
  - url: http://localhost:5090
security:
  - sessionCookie: []
paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/auth/status:
    get:
      summary: Read current authentication status and authorization public settings
      security: []
      responses:
        "200":
          description: Authentication status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"
  /api/auth/login:
    post:
      summary: Create local session, or LDAP/LDAPS session when IdP provider is LDAP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Session created.
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"
        "400":
          $ref: "#/components/responses/Error"
  /api/auth/logout:
    post:
      summary: Destroy current server-side session
      responses:
        "200":
          description: Session destroyed.
  /api/auth/session-credentials:
    post:
      summary: Store CMDBuild/Zabbix credentials in the current server-side session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionCredentialsRequest"
      responses:
        "200":
          description: Session credentials accepted.
        "428":
          $ref: "#/components/responses/Error"
  /api/auth/change-password:
    post:
      summary: Change password for current local user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed.
        "400":
          $ref: "#/components/responses/Error"
  /auth/saml2/metadata:
    get:
      summary: Read SAML2 service provider metadata
      security: []
      responses:
        "200":
          description: SP metadata XML for IdP registration.
          content:
            application/samlmetadata+xml:
              schema:
                type: string
  /auth/saml2/login:
    get:
      summary: Start SAML2 SP-initiated login
      security: []
      parameters:
        - name: returnUrl
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to IdP SSO endpoint with SAMLRequest.
          headers:
            Location:
              schema:
                type: string
        "409":
          $ref: "#/components/responses/Error"
  /auth/saml2/acs:
    post:
      summary: Consume SAML2 HTTP-POST response and create server-side session
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - SAMLResponse
              properties:
                SAMLResponse:
                  type: string
                RelayState:
                  type: string
      responses:
        "302":
          description: Session created, browser redirected to RelayState or root.
          headers:
            Set-Cookie:
              schema:
                type: string
            Location:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Error"
  /auth/saml2/logout:
    get:
      summary: Destroy local session and optionally start IdP SLO
      responses:
        "302":
          description: Redirect to root or IdP SLO endpoint.
          headers:
            Set-Cookie:
              schema:
                type: string
            Location:
              schema:
                type: string
  /auth/oauth2/login:
    get:
      summary: Start OAuth2/OIDC authorization code login
      security: []
      parameters:
        - name: returnUrl
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to configured authorization endpoint.
          headers:
            Location:
              schema:
                type: string
        "409":
          $ref: "#/components/responses/Error"
  /auth/oauth2/callback:
    get:
      summary: Consume OAuth2/OIDC callback and create server-side session
      security: []
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Session created, browser redirected to returnUrl or root.
          headers:
            Set-Cookie:
              schema:
                type: string
            Location:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Error"
  /api/services/health:
    get:
      summary: Read configured microservice health endpoints
      responses:
        "200":
          description: Health probe results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceHealthList"
  /api/services/{serviceName}/reload-rules:
    post:
      summary: Ask a configured microservice to reload conversion rules
      parameters:
        - name: serviceName
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reload signal accepted by the target service.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
  /api/events:
    get:
      summary: Read recent integration events
      description: Reads recent messages from configured Kafka topics through the BFF adapter.
      parameters:
        - name: topic
          in: query
          required: false
          schema:
            type: string
        - name: maxMessages
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Event list and configured topic list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventList"
  /api/rules/current:
    get:
      summary: Read current conversion rules
      responses:
        "200":
          description: Current rules and validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RulesDocument"
  /api/rules/validate:
    post:
      summary: Validate uploaded rules or current rules when body is empty
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RulesPayload"
      responses:
        "200":
          description: Validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResult"
  /api/rules/dry-run:
    post:
      summary: Apply rules to a sample CMDBuild payload without saving
      description: >
        Uses uploaded or current rules. Lookup fields can be resolved from the
        cached CMDBuild lookup values when source field metadata contains
        lookup type or resolve metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RulesDryRunRequest"
      responses:
        "200":
          description: Dry-run result.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/rules/starter:
    post:
      summary: Generate an empty production starter rules document
      description: >
        Generates a no-op rules document in memory. The document keeps routes
        disabled with publish=false, copies reusable T4 templates, and fills
        endpoints, Kafka topic hints, CMDBuild metadata, and Zabbix reference
        catalogs from the current runtime configuration and catalog caches.
        The call fails when CMDBuild or Zabbix catalog cache is missing or empty.
      responses:
        "200":
          description: Generated starter rules document and validation result.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "409":
          description: CMDBuild or Zabbix catalog cache is not loaded.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/rules/upload:
    post:
      deprecated: true
      summary: Validate conversion rules and return normalized JSON without backend save
      description: >
        Kept for compatibility with older clients. monitoring-ui-api does not
        write active rules files and does not commit or push to git; operators
        save JSON through the browser and publish it to the rules repository
        outside the application.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RulesPayload"
      responses:
        "200":
          description: Validation result and normalized rules content.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/rules/fix-mapping:
    post:
      summary: Validate and repair selected conversion rules logical control issues
      description: >
        Helper used by Logical Control of Conversion Rules. It returns repaired
        rules content in memory; the browser saves the JSON file and the backend
        active rules file is not changed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Conversion rules repair result.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/rules/history:
    get:
      summary: Disabled; git history is managed outside monitoring-ui-api
      responses:
        "410":
          description: Git history is managed outside monitoring-ui-api.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/zabbix/catalog:
    get:
      summary: Read Zabbix catalog cache status
      responses:
        "200":
          description: Catalog cache status.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/zabbix/catalog/status:
    get:
      summary: Read Zabbix catalog cache metadata
      responses:
        "200":
          description: Catalog cache file status.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/zabbix/catalog/mapping:
    get:
      summary: Read lightweight Zabbix catalog for Conversion Rules Management
      description: Returns counts and lightweight sections; large sections are loaded lazily through `/api/zabbix/catalog/{collection}`.
      responses:
        "200":
          description: Lightweight conversion rules catalog.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/zabbix/catalog/sync:
    post:
      summary: Synchronize Zabbix catalog and template metadata
      responses:
        "200":
          description: Synced catalog.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/zabbix/metadata:
    get:
      summary: Read Zabbix template compatibility metadata
      description: Returns template item keys, LLD rule keys, inventory links, existing host templates, Zabbix version, and conflict index from the Zabbix catalog cache.
      responses:
        "200":
          description: Zabbix metadata.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/zabbix/metadata/sync:
    post:
      summary: Synchronize Zabbix catalog and return metadata
      responses:
        "200":
          description: Synced Zabbix metadata.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/zabbix/catalog/{collection}:
    get:
      summary: Read Zabbix catalog collection from cache
      parameters:
        - $ref: "#/components/parameters/CatalogCollection"
      responses:
        "200":
          description: Catalog collection.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/cmdbuild/catalog:
    get:
      summary: Read CMDBuild catalog cache status
      responses:
        "200":
          description: Catalog cache status.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/cmdbuild/catalog/status:
    get:
      summary: Read CMDBuild catalog cache metadata
      responses:
        "200":
          description: Catalog cache file status.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/cmdbuild/catalog/sync:
    post:
      summary: Synchronize CMDBuild classes, class attributes, domains, lookup types, and lookup values
      description: >
        Lookup values are included when `Cmdbuild:Catalog:IncludeLookupValues`
        is enabled. Domains are cached for `Class.{domain:TargetClass}.Attribute`
        mapping paths. The cache is used by Conversion Rules Management and
        dry-run lookup resolution.
      responses:
        "200":
          description: Synced catalog.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/cmdbuild/catalog/{collection}:
    get:
      summary: Read CMDBuild catalog collection from cache
      parameters:
        - $ref: "#/components/parameters/CatalogCollection"
      responses:
        "200":
          description: Catalog collection.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/cmdbuild/webhooks:
    get:
      summary: Read CMDBuild webhooks for Webhook Setup
      description: >
        Requires an editor or admin session and CMDBuild session credentials.
        Reads `/etl/webhook/?detailed=true` from CMDBuild and returns normalized
        webhook objects. Browser clients do not connect to CMDBuild directly.
      responses:
        "200":
          description: CMDBuild webhook list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmdbuildWebhookList"
        "428":
          $ref: "#/components/responses/Error"
  /api/cmdbuild/webhooks/apply:
    post:
      summary: Apply selected CMDBuild webhook operations
      description: >
        Applies create/update/delete operations selected on the Webhook Setup
        page. The backend restricts operations to the managed
        `cmdbwebhooks2kafka-` prefix so unrelated CMDBuild webhooks are not
        changed by this workflow. For update/delete, the backend reloads the
        current CMDBuild webhook list and resolves the target record by managed
        `code` instead of trusting `current.id` from the client payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmdbuildWebhookApplyRequest"
      responses:
        "200":
          description: Operations applied in CMDBuild.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmdbuildWebhookApplyResponse"
        "400":
          $ref: "#/components/responses/Error"
        "428":
          $ref: "#/components/responses/Error"
  /api/settings/idp:
    get:
      summary: Read authorization settings with SAML2/OAuth2 and MS AD LDAP secrets redacted
      responses:
        "200":
          description: Authorization settings.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      summary: Save authorization mode, SAML2/OAuth2/MS AD LDAP settings, and role-to-group mapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Saved settings with secrets redacted.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/settings/runtime:
    get:
      summary: Read runtime settings shown on Runtime settings page
      responses:
        "200":
          description: Runtime settings merged from config and persisted UI settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSettings"
    put:
      summary: Save runtime settings to the configured UI settings file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeSettings"
      responses:
        "200":
          description: Saved runtime settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSettings"
  /api/settings/git:
    get:
      summary: Read conversion-rules Git settings
      responses:
        "200":
          description: Rules storage settings and current file status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitSettings"
    put:
      summary: Save conversion-rules Git settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitSettings"
      responses:
        "200":
          description: Saved rules storage settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitSettings"
  /api/settings/git/check:
    post:
      summary: Check conversion-rules file settings
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitSettings"
      responses:
        "200":
          description: File existence and rules version metadata.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/settings/git/load:
    post:
      summary: Load conversion rules from disk or local git working copy
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitSettings"
      responses:
        "200":
          description: File status plus rules document content when the file exists.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/settings/git/export:
    post:
      summary: Write rules and redacted webhook artifact to the configured local copy
      description: Commit and push are intentionally not performed by monitoring-ui-api.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Written file paths and current rules metadata.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: cmdb2m_session
  parameters:
    CatalogCollection:
      name: collection
      in: path
      required: true
      schema:
        type: string
        enum:
          - templates
          - host-groups
          - template-groups
          - tags
          - proxies
          - proxy-groups
          - global-macros
          - host-macros
          - inventory-fields
          - interface-profiles
          - host-statuses
          - maintenances
          - tls-psk-modes
          - value-maps
          - classes
          - attributes
          - domains
          - lookups
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required:
        - service
        - status
      properties:
        service:
          type: string
        status:
          type: string
          example: ok
    AuthStatus:
      type: object
      required:
        - authenticated
      properties:
        authenticated:
          type: boolean
        user:
          type: object
          nullable: true
          additionalProperties: true
        idp:
          type: object
          additionalProperties: true
        auth:
          type: object
          additionalProperties: true
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    SessionCredentialsRequest:
      type: object
      required:
        - service
        - username
        - password
      properties:
        service:
          type: string
          enum: [cmdbuild, zabbix]
        baseUrl:
          type: string
        apiEndpoint:
          type: string
        username:
          type: string
        password:
          type: string
          format: password
    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
    ServiceHealthList:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: Health probes for configured microservices. Items can include rulesStatus for services that expose rules status.
          items:
            type: object
            additionalProperties: true
        managementRules:
          type: object
          description: Current conversion-rules version read by monitoring-ui-api.
          additionalProperties: true
    EventList:
      type: object
      required:
        - items
        - topics
        - source
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        topics:
          type: array
          items:
            type: object
            additionalProperties: true
        selectedTopic:
          type: string
          nullable: true
        source:
          type: string
        message:
          type: string
    RuntimeSettings:
      type: object
      properties:
        filePath:
          type: string
        cmdbuild:
          type: object
          properties:
            baseUrl:
              type: string
            maxTraversalDepth:
              type: integer
              minimum: 2
              maximum: 5
              default: 2
              description: Max recursion depth for CMDBuild domain/reference/lookup traversal. Takes effect after logout and CMDBuild catalog resync.
        zabbix:
          type: object
          properties:
            apiEndpoint:
              type: string
            apiToken:
              type: string
              format: password
        eventBrowser:
          type: object
          additionalProperties: true
    GitSettings:
      type: object
      properties:
        filePath:
          type: string
        rules:
          type: object
          properties:
            rulesFilePath:
              type: string
              example: rules/cmdbuild-to-zabbix-host-create.json
            readFromGit:
              type: boolean
            repositoryPath:
              type: string
              example: rules-git-working-copy
            repositoryUrl:
              type: string
              example: https://git.example.org/cmdb2monitoring/conversion-rules.git
        status:
          type: object
          additionalProperties: true
    CmdbuildWebhookList:
      type: object
      required:
        - loadedAt
        - cmdbuildEndpoint
        - managedPrefix
        - items
      properties:
        loadedAt:
          type: string
          format: date-time
        cmdbuildEndpoint:
          type: string
        managedPrefix:
          type: string
          example: cmdbwebhooks2kafka-
        items:
          type: array
          items:
            $ref: "#/components/schemas/CmdbuildWebhook"
    CmdbuildWebhook:
      type: object
      properties:
        _id:
          type: string
        code:
          type: string
        description:
          type: string
        event:
          type: string
          example: card_update_after
        target:
          type: string
        method:
          type: string
          example: post
        url:
          type: string
        headers:
          type: object
          additionalProperties: true
        body:
          type: object
          additionalProperties: true
        language:
          type: string
        active:
          type: boolean
    CmdbuildWebhookApplyRequest:
      type: object
      required:
        - operations
      properties:
        operations:
          type: array
          items:
            type: object
            required:
              - action
            properties:
              action:
                type: string
                enum: [create, update, delete]
              selected:
                type: boolean
              code:
                type: string
              current:
                $ref: "#/components/schemas/CmdbuildWebhook"
              desired:
                $ref: "#/components/schemas/CmdbuildWebhook"
    CmdbuildWebhookApplyResponse:
      type: object
      required:
        - appliedAt
        - count
        - results
      properties:
        appliedAt:
          type: string
          format: date-time
        cmdbuildEndpoint:
          type: string
        count:
          type: integer
        results:
          type: array
          items:
            type: object
            additionalProperties: true
    RulesDocument:
      type: object
      properties:
        path:
          type: string
        resolvedPath:
          type: string
        source:
          type: string
          enum: [disk, git]
        fileName:
          type: string
        schemaVersion:
          type: string
        rulesVersion:
          type: string
        name:
          type: string
        validation:
          $ref: "#/components/schemas/ValidationResult"
        content:
          type: object
          description: >
            Conversion rules JSON. Source fields can include `cmdbPath`,
            `type`, `lookupType`, and `resolve` metadata for reference/lookup/domain
            leaf resolution while webhook payload remains flat.
          additionalProperties: true
    RulesPayload:
      type: object
      properties:
        content:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
        rules:
          type: object
          additionalProperties: true
        save:
          type: boolean
          deprecated: true
          description: Ignored. Rules are not saved on the backend by monitoring-ui-api.
    RulesDryRunRequest:
      type: object
      required:
        - payload
      properties:
        rules:
          type: object
          additionalProperties: true
        payload:
          type: object
          additionalProperties: true
    ValidationResult:
      type: object
      required:
        - valid
        - errors
        - warnings
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
